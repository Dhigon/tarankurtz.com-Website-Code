        async function checkOnlineStatus() {
            // Check File Server
            fetch(HFS_URL, { mode: 'no-cors', cache: 'no-store' })
                .then(() => setStatus('hfsStatus', true))
                .catch(() => setStatus('hfsStatus', false));
                
            // Check NAS Status via admin port
            fetch(NAS_SETTINGS_URL, { mode: 'no-cors', cache: 'no-store' })
                .then(() => {
                    const el = document.getElementById('plexStatus');
                    if (el) el.innerHTML = `<span class="status-dot bg-green-500"></span> Online`;
                })
                .catch(() => {
                    const el = document.getElementById('plexStatus');
                    if (el) el.innerHTML = `<span class="status-dot bg-red-500"></span> Offline`;
                });
        }
