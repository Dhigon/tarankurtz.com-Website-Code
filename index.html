<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taran's Portal</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://transfer.tarankurtz.com:8443/KurtzHome610/assets%20(website)/images/ICON.jpg">
    <link rel="icon" type="image/jpeg" href="https://transfer.tarankurtz.com:8443/KurtzHome610/assets%20(website)/images/ICON.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        #mainBody { background-image: url('https://transfer.tarankurtz.com:8443/KurtzHome610/assets%20(website)/images/background-1.jpg'); background-size: cover; background-position: center; background-attachment: fixed; background-color: #09090b; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .dashboard-card { height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; cursor: pointer; transition: all 0.2s ease; z-index: 20; }
        .modal-fixed-height { height: 520px; display: flex; flex-direction: column; }
    </style>
</head>
<body id="mainBody" class="bg-zinc-950 text-white min-h-screen flex flex-col items-center p-6 font-sans">

    <script>
        const TMDB_KEY = '016c19fa578a651dfbd937a4a5fc8323';
        const HFS_URL = 'https://transfer.tarankurtz.com:8443'; 
        const ADMIN_PASS = 'Potatoes2!'; 
    </script>

    <main class="flex-1 flex flex-col items-center justify-center w-full max-w-4xl py-10">
        <div class="text-center mb-4">
            <p class="text-[10px] tracking-[0.3em] uppercase text-zinc-500 font-bold">tarankurtz.com</p>
            <p class="text-[9px] tracking-widest uppercase text-zinc-600">- A Server for Friends and Family -</p>
        </div>
        <h1 class="text-3xl font-light tracking-widest mb-10 text-center uppercase">Taran's Portal</h1>

        <div class="w-full max-w-2xl mb-12">
            <div class="flex items-center bg-zinc-900/80 backdrop-blur-md border border-zinc-800 rounded-full px-2 py-2 shadow-xl">
                <input type="text" id="mainSearch" onkeydown="if(event.key==='Enter') window.location.href='https://google.com/search?q='+encodeURIComponent(this.value)" placeholder="Search or ask AI..." class="flex-1 py-2 px-6 text-base bg-transparent outline-none">
                <button onclick="window.location.href='https://gemini.google.com/app'" class="p-2.5 bg-blue-600 rounded-full text-white">AI</button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 w-full mb-12">
            <a href="https://transfer.tarankurtz.com:8443" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl">
                <div id="hfsStatus" class="absolute top-2 text-[8px] uppercase tracking-tighter text-zinc-500 italic">Checking...</div>
                📂 Files
            </a>
            <a href="http://plex.tarankurtz.com:32400" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl">
                <div id="plexStatus" class="absolute top-2 text-[8px] uppercase tracking-tighter text-zinc-500 italic">Checking...</div>
                🎬 Plex <span onclick="event.preventDefault(); alert('Requesting access...');" class="text-[9px] underline">Request Access</span>
            </a>
            <a href="https://youtube.com" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl">▶️ YouTube</a>
            <a href="https://remotedesktop.google.com/access" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl">🖥️ Remote</a>
            <a href="https://NAS.tarankurtz.com:8001/" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl">⚙️ NAS Settings</a>
            <div onclick="toggleModal('requestModal')" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl">
                📥 Request <span onclick="event.stopPropagation(); openListView();" class="text-[9px] underline">View List</span>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-10"><button onclick="verifyAdmin()" class="text-[9px] uppercase tracking-[0.4em]">Admin Portal</button></footer>

    <div id="requestModal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-4">
        <div class="w-full max-w-md bg-zinc-900 p-8 rounded-3xl modal-fixed-height">
            <button onclick="toggleModal('requestModal')" class="absolute top-4 right-4">✕</button>
            <input type="text" id="movieSearch" placeholder="Search..." class="w-full bg-zinc-800 p-3 rounded-xl">
            <div id="results" class="mt-4 flex-1 overflow-y-auto"></div>
        </div>
    </div>
    <div id="listModal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-4">
        <div class="w-full max-w-md bg-zinc-900 p-8 rounded-3xl modal-fixed-height">
            <button onclick="toggleModal('listModal')" class="absolute top-4 right-4">✕</button>
            <ul id="publicRequestList" class="flex-1 overflow-y-auto"></ul>
        </div>
    </div>

    <script>
        // Online Status Logic
        fetch('https://transfer.tarankurtz.com:8443', {mode: 'no-cors'}).then(() => document.getElementById('hfsStatus').innerHTML = '<span class="status-dot bg-green-500"></span> Online').catch(() => document.getElementById('hfsStatus').innerHTML = '<span class="status-dot bg-red-500"></span> Offline');
        fetch('http://plex.tarankurtz.com:32400', {mode: 'no-cors'}).then(() => document.getElementById('plexStatus').innerHTML = '<span class="status-dot bg-green-500"></span> Online').catch(() => document.getElementById('plexStatus').innerHTML = '<span class="status-dot bg-red-500"></span> Offline');

        document.getElementById('movieSearch').addEventListener('input', async (e) => {
            const val = e.target.value; if (val.length < 3) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(val)}`);
            const data = await res.json();
            const results = document.getElementById('results'); results.innerHTML = '';
            data.results.slice(0, 6).forEach(item => {
                const title = item.title || item.name;
                const div = document.createElement('div'); div.className = 'p-3 border-b text-xs cursor-pointer';
                div.innerHTML = title;
                div.onclick = () => { 
                    let list = JSON.parse(localStorage.getItem('mediaRequests') || '[]');
                    list.push({ title: title }); localStorage.setItem('mediaRequests', JSON.stringify(list));
                    alert("Added"); 
                };
                results.appendChild(div);
            });
        });
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); document.getElementById(id).classList.toggle('flex'); }
        function openListView() { const list = document.getElementById('publicRequestList'); list.innerHTML = ''; JSON.parse(localStorage.getItem('mediaRequests') || '[]').forEach(r => list.innerHTML += `<li class="p-3 border-b">${r.title}</li>`); toggleModal('listModal'); }
        function verifyAdmin() { if(prompt("Code:") === ADMIN_PASS) alert("Admin Access Enabled"); }
    </script>
</body>
</html>
