<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="mobile-web-app-capable" content="yes">

    <link rel="apple-touch-icon" href="https://transfer.tarankurtz.com:8443/KurtzHome610/assets%20(website)/images/ICON.jpg">
    <link rel="icon" type="image/jpeg" href="https://transfer.tarankurtz.com:8443/KurtzHome610/assets%20(website)/images/ICON.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        
        #mainBody { 
            background-image: url('https://transfer.tarankurtz.com:8443/KurtzHome610/assets%20(website)/images/background-1.jpg');
            background-size: cover; background-position: center; background-attachment: fixed; background-color: #09090b;
        }

        .dashboard-card { height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; cursor: pointer; transition: all 0.2s ease; z-index: 20; }
        
        #mainSearch, #mainSearch:focus, #mainSearch:active, #mainSearch:-webkit-autofill { 
            outline: none !important; box-shadow: none !important; border: none !important; 
            background: transparent !important; background-color: transparent !important;
            color: white !important; -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s; appearance: none !important; 
        }

        .brand-icon { width: 42px; height: 42px; object-fit: contain; margin-bottom: 8px; }
        .modal-fixed-height { height: 520px; display: flex; flex-direction: column; }
    </style>
</head>
<body id="mainBody" class="bg-zinc-950 text-white min-h-screen flex flex-col items-center p-6 font-sans">

    <script>
        const TMDB_KEY = '016c19fa578a651dfbd937a4a5fc8323';
        const HFS_URL = 'https://transfer.tarankurtz.com:8443'; 
        const PLEX_URL = 'http://plex.tarankurtz.com:32400';
        const NAS_SETTINGS_URL = 'https://NAS.tarankurtz.com:8001/';
        const ROUTER_URL = 'http://192.168.1.254';
        const CLOUDFLARE_URL = 'https://dash.cloudflare.com/03c14d743f0edb4784c1a97f7214f300/home/overview';
        const ADMIN_PASS = 'Potatoes2!'; 
    </script>

    <main class="flex-1 flex flex-col items-center justify-center w-full max-w-4xl py-10">
        <div class="text-center mb-4">
            <p class="text-[10px] tracking-[0.3em] uppercase text-zinc-500 font-bold">tarankurtz.com</p>
            <p class="text-[9px] tracking-widest uppercase text-zinc-600">- A Server for Friends and Family -</p>
        </div>

        <h1 id="editableTitle" class="text-3xl font-light tracking-widest mb-10 text-center uppercase">Taran's Portal</h1>

        <div class="w-full max-w-2xl mb-12">
            <div class="flex items-center bg-zinc-900/80 backdrop-blur-md border border-zinc-800 rounded-full px-2 py-2 shadow-xl focus-within:border-zinc-700 transition-all">
                <input type="text" id="mainSearch" onkeydown="if(event.key==='Enter') window.location.href='https://google.com/search?q='+encodeURIComponent(this.value)" placeholder="Search or ask AI..." class="flex-1 py-2 px-6 text-base">
                <button onclick="window.location.href='https://gemini.google.com/app'" class="p-2.5 bg-blue-600 hover:bg-blue-500 rounded-full text-white mr-1 transition-transform active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 w-full mb-12">
            <div onclick="window.location.href=HFS_URL" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-blue-500">
                <div class="text-3xl mb-1">📂</div><div class="text-[11px] uppercase tracking-widest font-bold">Files</div>
            </div>
            <div onclick="window.location.href=PLEX_URL" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-orange-500">
                <div class="text-3xl mb-1">🎬</div><div class="text-[11px] uppercase tracking-widest font-bold">Plex</div>
                <span onclick="event.stopPropagation(); alert('Requesting access...');" class="absolute bottom-2 text-[8px] text-zinc-500 underline uppercase hover:text-orange-400 z-50">Request Access</span>
            </div>
            <div onclick="window.location.href='https://youtube.com'" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-red-600">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" class="brand-icon" alt="YouTube">
                <div class="text-[11px] uppercase tracking-widest font-bold">YouTube</div>
            </div>
            <div onclick="window.location.href='https://remotedesktop.google.com/access'" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-blue-400">
                <div class="text-3xl mb-1">🖥️</div><div class="text-[11px] uppercase tracking-widest font-bold">Remote</div>
            </div>
            <div onclick="window.location.href=NAS_SETTINGS_URL" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-zinc-400">
                <div class="text-3xl mb-1">⚙️</div><div class="text-[11px] uppercase tracking-widest font-bold text-center px-2">NAS Settings</div>
            </div>
            <div onclick="toggleModal('requestModal')" class="dashboard-card bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-emerald-500">
                <div class="text-3xl mb-1">📥</div><div class="text-[11px] uppercase tracking-widest font-bold">Request</div>
                <span onclick="event.stopPropagation(); openListView();" class="absolute bottom-2 text-[9px] text-zinc-600 underline uppercase tracking-widest hover:text-white z-50">View List</span>
            </div>
        </div>
    </main>

    <div id="requestModal" class="fixed inset-0 bg-black/95 hidden items-center justify-center z-[100] p-4"><div class="w-full max-w-md bg-zinc-900 p-8 rounded-3xl modal-fixed-height"><button onclick="toggleModal('requestModal')" class="absolute top-4 right-4">✕</button><input type="text" id="movieSearch" placeholder="Search Title (Year)..." class="w-full bg-zinc-800 p-3 rounded-xl text-white"><div id="results" class="mt-4 flex-1 overflow-y-auto"></div></div></div>
    <div id="listModal" class="fixed inset-0 bg-black/95 hidden items-center justify-center z-[100] p-4"><div class="w-full max-w-md bg-zinc-900 p-8 rounded-3xl modal-fixed-height"><button onclick="toggleModal('listModal')" class="absolute top-4 right-4">✕</button><ul id="publicRequestList" class="flex-1 overflow-y-auto"></ul></div></div>

    <footer class="mt-auto py-10"><button onclick="verifyAdmin()" class="text-[9px] uppercase tracking-[0.4em]">Admin Portal</button></footer>

    <script>
        /* Updated Request Logic [Predictive Search includes Year and Media Type] */
        document.getElementById('movieSearch').addEventListener('input', async (e) => {
            const val = e.target.value; if (val.length < 3) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(val)}`);
            const data = await res.json();
            const results = document.getElementById('results'); results.innerHTML = '';
            data.results.slice(0, 6).forEach(item => {
                const title = item.title || item.name; 
                const year = (item.release_date || item.first_air_date || '').split('-')[0] || 'N/A';
                const type = item.media_type === 'tv' ? 'TV' : 'Movie';
                const div = document.createElement('div'); div.className = 'p-3 border-b border-zinc-700 text-xs flex justify-between cursor-pointer hover:bg-zinc-700';
                // Request formatting: Title (Year) - Type
                div.innerHTML = `<span><b>${title}</b> (${year})</span> <span class="text-zinc-500"> - ${type}</span>`;
                div.onclick = () => { 
                    let list = JSON.parse(localStorage.getItem('mediaRequests') || '[]');
                    list.push({ title: `${title} (${year}) - ${type}` }); 
                    localStorage.setItem('mediaRequests', JSON.stringify(list));
                    alert("Added to Queue"); 
                };
                results.appendChild(div);
            });
        });

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); document.getElementById(id).classList.toggle('flex'); }
        function openListView() { const list = document.getElementById('publicRequestList'); list.innerHTML = ''; JSON.parse(localStorage.getItem('mediaRequests') || '[]').forEach(r => list.innerHTML += `<li class="p-3 border-b text-xs">${r.title}</li>`); toggleModal('listModal'); }
        function verifyAdmin() { if(prompt("Code:") === ADMIN_PASS) alert("Admin Mode Active"); }
    </script>
</body>
</html>
