<script>
        /** * REPAIR LOGIC: PLEX CONNECTIVITY & TIMEOUT */
        
        async function runVerification(title, year, tag, type) {
            const entry = `${title} (${year}) ${tag} - ${type}`.replace(/\s+/g, ' ').trim();
            const msg = document.getElementById('statusMsg');
            msg.className = "mt-4 p-3 rounded-xl text-center text-sm bg-zinc-800 block text-white";
            msg.innerText = "Checking Library..."; 
            msg.classList.remove('hidden');

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2000); // 2 second timeout limit

            try {
                // Constructing precise Plex search URL
                const plexSearchUrl = `${PLEX_URL}/search?query=${encodeURIComponent(title)}&X-Plex-Token=${PLEX_TOKEN}`;
                
                const plexRes = await fetch(plexSearchUrl, { 
                    method: 'GET',
                    signal: controller.signal,
                    headers: { 'Accept': 'application/json' } 
                });

                const data = await plexRes.text();
                clearTimeout(timeoutId);

                if(data.includes(title) && tag === "") {
                    msg.innerText = "✅ Already on Plex!"; 
                    msg.classList.add('text-blue-400'); 
                    return; 
                }
            } catch(e) {
                console.log("Plex Check Timed Out or Blocked - Defaulting to Queue");
                // If Plex is down or blocking HTTPS, we skip to adding to the list
            }

            // ADD TO QUEUE LOGIC (Runs if Plex is missing or check fails)
            let list = JSON.parse(localStorage.getItem('mediaRequests') || '[]');
            if(!list.some(r => r.title === entry)) {
                list.push({ title: entry, id: Date.now() });
                localStorage.setItem('mediaRequests', JSON.stringify(list));
                msg.innerText = "🚀 Added to Queue!"; 
                msg.classList.remove('text-white');
                msg.classList.add('text-emerald-400');
                setTimeout(closeRequestModal, 1500);
            } else {
                msg.innerText = "⚠️ Already in list!"; 
                msg.classList.add('text-yellow-400');
            }
        }

        // Updated Status Ping to handle Plex specifically
        async function checkOnlineStatus() {
            // HFS Check
            fetch(HFS_URL, { mode: 'no-cors' })
                .then(() => setStatus('hfsStatus', true))
                .catch(() => setStatus('hfsStatus', false));

            // Plex Identity Check
            fetch(`${PLEX_URL}/identity`, { mode: 'no-cors' })
                .then(() => setStatus('plexStatus', true))
                .catch(() => setStatus('plexStatus', false));
        }

        function setStatus(id, online) {
            const el = document.getElementById(id);
            if (!el) return;
            el.innerHTML = online ? 
                `<span class="status-dot bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.4)]"></span> Online` : 
                `<span class="status-dot bg-red-500"></span> Offline`;
        }
