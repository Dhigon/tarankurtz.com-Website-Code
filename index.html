<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taran's Portal</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Taran's Portal">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/10156/10156015.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        #mainBody { background-size: cover; background-position: center; background-attachment: fixed; transition: background-image 0.5s ease-in-out; background-color: #09090b; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dashboard-card { height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; cursor: pointer; }
        .sub-link { position: absolute; bottom: 12px; font-size: 10px; color: #52525b; text-transform: uppercase; letter-spacing: 0.05em; text-decoration: underline; z-index: 50; }
        .sub-link:hover { color: #ffffff; }
        .modal-fixed-height { height: 500px; display: flex; flex-direction: column; }
    </style>
</head>
<body id="mainBody" class="bg-zinc-950 text-white min-h-screen flex flex-col items-center justify-center p-6 font-sans">

    <script>
        const TMDB_KEY = '016c19fa578a651dfbd937a4a5fc8323';
        const PLEX_TOKEN = '5msRNVbv92Z_oVfyBcrv';
        const PLEX_URL = 'http://plex.tarankurtz.com:32400'; 
        const NAS_LOCAL_IP = 'http://192.168.1.XX:32400'; // UPDATE THIS TO YOUR NAS LOCAL IP
        const HFS_URL = 'https://transfer.tarankurtz.com:8443'; 
        const ASSETS_URL = 'https://transfer.tarankurtz.com:8443/KurtzHome610/assets%20(website)/images/';
        const ADMIN_PASS = 'Potatoes2!'; 
    </script>

    <div class="text-center mb-4">
        <p class="text-xs tracking-[0.3em] uppercase text-zinc-500 font-medium">tarankurtz.com</p>
        <p class="text-[10px] tracking-widest uppercase text-zinc-600">- A Server for Friends and Family -</p>
    </div>

    <h1 id="editableTitle" class="text-4xl font-light tracking-widest mb-10 text-center uppercase"></h1>

    <div class="w-full max-w-2xl mb-12">
        <div class="flex items-center bg-zinc-900/80 backdrop-blur-md border border-zinc-800 rounded-full px-2 py-2 shadow-xl">
            <input type="text" id="mainSearch" onkeydown="if(event.key==='Enter') doSearch('google')" placeholder="Search or ask AI..." class="flex-1 bg-transparent py-3 px-6 text-lg focus:outline-none">
            <button onclick="doSearch('ai')" class="p-3 bg-blue-600 hover:bg-blue-500 rounded-full text-white mr-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl mb-12">
        <div class="flex flex-col items-center">
            <div id="hfsStatus" class="text-[9px] uppercase tracking-tighter mb-1 text-zinc-500 italic">Checking...</div>
            <div onclick="window.location.href=HFS_URL" class="dashboard-card w-full bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-blue-500 transition-all">
                <div class="text-3xl mb-1">📂</div>
                <div class="text-sm">Files</div>
            </div>
        </div>

        <div class="flex flex-col items-center">
            <div id="plexStatus" class="text-[9px] uppercase tracking-tighter mb-1 text-zinc-500 italic">Checking...</div>
            <div onclick="window.open(PLEX_URL, '_blank')" class="dashboard-card w-full bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-orange-500 transition-all">
                <div class="text-3xl mb-1">🎬</div>
                <div class="text-sm">Plex</div>
            </div>
        </div>

        <div class="flex flex-col items-center">
            <div class="text-[9px] opacity-0 mb-1">.</div>
            <div onclick="toggleModal('requestModal')" class="dashboard-card w-full bg-zinc-900/90 border border-zinc-800 rounded-2xl hover:border-emerald-500 transition-all">
                <div class="text-3xl mb-1">📥</div>
                <div class="text-sm">Request</div>
                <span onclick="event.stopPropagation(); openListView();" class="sub-link">View List</span>
            </div>
        </div>
    </div>

    <div id="requestModal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden items-center justify-center z-[100] p-4">
        <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 p-8 rounded-3xl relative modal-fixed-height">
            <button onclick="closeRequestModal()" class="absolute top-4 right-4 text-zinc-500">✕</button>
            <h2 class="text-xl font-semibold mb-6 text-center text-emerald-400 uppercase tracking-widest">Media Request</h2>
            
            <div id="searchContainer" class="flex flex-col overflow-hidden flex-1">
                <input type="text" id="movieSearch" placeholder="Search Movie/TV..." class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-3 px-4 text-white outline-none">
                <div id="results" class="mt-4 bg-zinc-800 border border-zinc-700 rounded-xl hidden overflow-y-auto"></div>
            </div>

            <div id="drillDownContainer" class="hidden flex flex-col overflow-hidden flex-1">
                <div id="drillDownResults" class="bg-zinc-800 border border-zinc-700 rounded-xl overflow-y-auto flex-1"></div>
                <div class="flex gap-2 mt-4">
                    <button id="backToSeasonBtn" onclick="backToSeasons()" class="hidden flex-1 py-2 text-xs text-blue-400 border border-blue-900/50 rounded-lg uppercase">← Back</button>
                    <button onclick="resetSearch()" class="flex-1 py-2 text-xs text-red-500 border border-red-900/40 rounded-lg uppercase">Restart</button>
                </div>
            </div>
            
            <div id="statusMsg" class="mt-4 p-3 rounded-xl text-center text-sm hidden"></div>

            <button onclick="closeRequestModal(); openListView();" class="mt-6 w-full py-2 bg-zinc-800/50 border border-zinc-700 rounded-lg text-[10px] text-zinc-400 hover:text-emerald-400 hover:border-emerald-900 uppercase tracking-widest transition-all">
                View Current Request Queue
            </button>
        </div>
    </div>

    <div id="listModal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden items-center justify-center z-[100] p-4">
        <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 p-8 rounded-3xl relative" style="height: 500px; display: flex; flex-direction: column;">
            <button onclick="toggleModal('listModal')" class="absolute top-4 right-4 text-zinc-500">✕</button>
            <h2 class="text-xl font-semibold mb-6 text-center text-yellow-400 uppercase">Current Queue</h2>
            <ul id="publicRequestList" class="space-y-2 overflow-y-auto flex-1 mb-4"></ul>
            <div id="adminListControls" class="hidden"><button onclick="clearAllRequests()" class="w-full bg-red-900/30 text-red-500 py-3 rounded-xl text-[10px] border border-red-900/50 uppercase">Clear All</button></div>
        </div>
    </div>

    <div id="adminPanel" class="fixed bottom-20 bg-zinc-900 border border-zinc-800 p-6 rounded-2xl hidden flex-col gap-4 shadow-2xl z-50 w-80">
        <input type="text" id="adminTitleIn" placeholder="Website Title..." class="w-full bg-zinc-800 p-2 text-xs rounded outline-none border border-zinc-700">
        <input type="text" id="adminBgIn" placeholder="Ex: Background - 1 (No .jpg)..." class="w-full bg-zinc-800 p-2 text-xs rounded outline-none border border-zinc-700">
        <button onclick="saveAdminChanges()" class="bg-blue-600 py-2 rounded text-[10px] font-bold uppercase">Apply</button>
    </div>

    <footer class="mt-20">
        <div onclick="verifyAdmin()" class="text-zinc-800 text-[9px] tracking-[0.4em] cursor-pointer hover:text-zinc-500 uppercase">Private Admin Dashboard</div>
    </footer>

    <script>
        let selectedShow = null; let adminMode = false;

        function updateBackground(url) {
            if(!url) return;
            // Request #2 Fix: Directly force the style on the body element
            const body = document.getElementById('mainBody');
            body.style.backgroundImage = `url('${url}')`;
            body.style.backgroundSize = "cover";
        }

        (function init() {
            const savedTitle = localStorage.getItem('portalTitle') || "Taran's Portal";
            document.getElementById('editableTitle').innerText = savedTitle;
            updateBackground(localStorage.getItem('portalBg'));
            window.addEventListener('load', checkOnlineStatus);
        })();

        async function checkOnlineStatus() {
            // Request #1 Fix: Ping NAS Local IP instead of public domain to see physical status
            fetch(HFS_URL, { mode: 'no-cors' }).then(() => setStatus('hfsStatus', true)).catch(() => setStatus('hfsStatus', false));
            fetch(NAS_LOCAL_IP, { mode: 'no-cors' }).then(() => setStatus('plexStatus', true)).catch(() => setStatus('plexStatus', false));
        }

        function setStatus(id, online) {
            const el = document.getElementById(id);
            if (el) el.innerHTML = online ? `<span class="status-dot bg-green-500"></span> Online` : `<span class="status-dot bg-red-500"></span> Offline`;
        }

        function doSearch(type) {
            const q = document.getElementById('mainSearch').value;
            if(!q) return;
            window.location.href = type === 'google' ? `https://google.com/search?q=${encodeURIComponent(q)}` : `https://gemini.google.com/app?q=${encodeURIComponent(q)}`;
        }

        // --- MEDIA REQUEST LOGIC ---
        document.getElementById('movieSearch').addEventListener('input', async (e) => {
            const val = e.target.value;
            if (val.length < 3) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${val}`);
            const data = await res.json();
            const results = document.getElementById('results');
            results.innerHTML = ''; results.classList.remove('hidden');
            data.results.slice(0, 5).forEach(item => {
                const title = item.title || item.name;
                const year = (item.release_date || item.first_air_date || '').split('-')[0];
                const div = document.createElement('div');
                div.className = 'p-3 hover:bg-zinc-700 cursor-pointer border-b border-zinc-700 text-xs';
                div.innerHTML = `<b>${title}</b> (${year})`;
                div.onclick = () => item.media_type === 'tv' ? startTvFlow(item.id, title, year) : runVerification(title, year, "", "MOVIE");
                results.appendChild(div);
            });
        });

        async function startTvFlow(id, title, year) {
            selectedShow = { id, title, year };
            document.getElementById('searchContainer').classList.add('hidden');
            document.getElementById('drillDownContainer').classList.remove('hidden');
            const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${TMDB_KEY}`);
            const data = await res.json();
            const box = document.getElementById('drillDownResults');
            box.innerHTML = `<div class="p-3 bg-emerald-600/20 text-center text-xs cursor-pointer mb-2" onclick="runVerification('${title}', '${year}', '', 'TV')">Full Series</div>`;
            data.seasons.forEach(s => {
                const d = document.createElement('div');
                d.className = 'p-3 hover:bg-zinc-700 border-b border-zinc-700 text-xs cursor-pointer';
                d.innerText = s.name;
                d.onclick = () => {
                    document.getElementById('backToSeasonBtn').classList.remove('hidden');
                    box.innerHTML = `<div class="p-3 bg-blue-600/20 text-center text-xs cursor-pointer mb-2" onclick="runVerification('${title}', '${year}', '[S${s.season_number}]', 'TV')">Season ${s.season_number}</div>`;
                    for(let i=1; i<=s.episode_count; i++) {
                        const ep = document.createElement('div');
                        ep.className = 'p-2 hover:bg-zinc-700 border-b border-zinc-700 text-[10px] pl-6 cursor-pointer';
                        ep.innerText = `Episode ${i}`;
                        ep.onclick = () => runVerification(title, year, `[S${s.season_number}E${i.toString().padStart(2,'0')}]`, "TV");
                        box.appendChild(ep);
                    }
                };
                box.appendChild(d);
            });
        }

        async function runVerification(title, year, tag, type) {
            const entry = `${title} (${year}) ${tag} - ${type}`.trim();
            let list = JSON.parse(localStorage.getItem('mediaRequests') || '[]');
            if(!list.some(r => r.title === entry)) {
                list.push({ title: entry, id: Date.now() });
                localStorage.setItem('mediaRequests', JSON.stringify(list));
                alert("Request Added!");
            } else { alert("Already in list!"); }
        }

        function openListView() { renderRequests(); if(adminMode) document.getElementById('adminListControls').classList.remove('hidden'); toggleModal('listModal'); }
        function renderRequests() {
            const list = document.getElementById('publicRequestList');
            const data = JSON.parse(localStorage.getItem('mediaRequests') || '[]');
            list.innerHTML = data.length === 0 ? '<li class="text-zinc-600 italic text-center text-xs">Empty</li>' :
                data.map(req => `<li class="flex justify-between items-center bg-zinc-800/40 p-3 rounded-xl border border-zinc-800 text-[11px]"><span>${req.title}</span>${adminMode ? `<button onclick="removeReq(${req.id})" class="text-red-500">✕</button>` : ''}</li>`).join('');
        }

        function removeReq(id) {
            let data = JSON.parse(localStorage.getItem('mediaRequests') || '[]');
            localStorage.setItem('mediaRequests', JSON.stringify(data.filter(r => r.id !== id)));
            renderRequests();
        }

        function clearAllRequests() { if(confirm("Clear?")) { localStorage.setItem('mediaRequests', '[]'); renderRequests(); } }
        function verifyAdmin() { if (prompt("Code:") === ADMIN_PASS) { adminMode = true; document.getElementById('adminPanel').classList.toggle('hidden'); document.getElementById('adminPanel').classList.toggle('flex'); } }

        function saveAdminChanges() {
            const t = document.getElementById('adminTitleIn').value;
            const b = document.getElementById('adminBgIn').value;
            if(t) { localStorage.setItem('portalTitle', t); document.getElementById('editableTitle').innerText = t; }
            if(b) { 
                const fullUrl = `${ASSETS_URL}${encodeURIComponent(b.trim())}.jpg`; 
                localStorage.setItem('portalBg', fullUrl); 
                updateBackground(fullUrl); 
            }
            alert("Updated!");
        }

        function toggleModal(id) { const m = document.getElementById(id); m.classList.toggle('hidden'); m.classList.toggle('flex'); }
        function closeRequestModal() { toggleModal('requestModal'); resetSearch(); }
        function resetSearch() { 
            document.getElementById('searchContainer').classList.remove('hidden'); 
            document.getElementById('drillDownContainer').classList.add('hidden'); 
            document.getElementById('movieSearch').value = ""; 
            document.getElementById('results').classList.add('hidden'); 
            document.getElementById('backToSeasonBtn').classList.add('hidden');
            selectedShow = null; 
        }
        function backToSeasons() { if(selectedShow) startTvFlow(selectedShow.id, selectedShow.title, selectedShow.year); }
    </script>
</body>
</html>
