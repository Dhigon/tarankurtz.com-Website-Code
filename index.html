<script>
        /** * LOGIC UPDATE: EXTENDED TIMEOUT & MANUAL CLOSE */
        
        async function runVerification(title, year, tag, type) {
            const entry = `${title} (${year}) ${tag} - ${type}`.trim();
            const msg = document.getElementById('statusMsg');
            
            // Reset message state
            msg.className = "mt-4 p-3 rounded-xl text-center text-sm bg-zinc-800 block text-white";
            msg.innerText = "Checking Library..."; 
            msg.classList.remove('hidden');

            const controller = new AbortController();
            // RULE: Increased timeout to 5 seconds for slower connections
            const tId = setTimeout(() => controller.abort(), 5000); 

            try {
                const plexRes = await fetch(`${PLEX_URL}/search?query=${encodeURIComponent(title)}&X-Plex-Token=${PLEX_TOKEN}`, { signal: controller.signal });
                const text = await plexRes.text();
                clearTimeout(tId);
                
                if(text.includes(title) && tag === "") {
                    msg.innerText = "✅ Already on Plex!"; 
                    msg.classList.remove('text-white');
                    msg.classList.add('text-blue-400'); 
                    return; // Stop here if found
                }
            } catch(e) { 
                console.log("Plex check bypassed (Timeout or Blocked) - Adding to local queue."); 
            }

            // ADD TO LOCALSTORAGE QUEUE
            let list = JSON.parse(localStorage.getItem('mediaRequests') || '[]');
            if(!list.some(r => r.title === entry)) {
                list.push({ title: entry, id: Date.now() });
                localStorage.setItem('mediaRequests', JSON.stringify(list));
                
                msg.innerText = "🚀 Added to Queue!"; 
                msg.classList.remove('text-white');
                msg.classList.add('text-emerald-400');
                
                // RULE: Removed auto-close. User must click 'Restart' or 'X' to finish.
                // This allows them to see the confirmation or request more items.
            } else {
                msg.innerText = "⚠️ Already in list!"; 
                msg.classList.remove('text-white');
                msg.classList.add('text-yellow-400');
            }
        }
