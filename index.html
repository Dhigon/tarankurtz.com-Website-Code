<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taran's Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col items-center justify-center p-6 font-sans">

    <script>
        const TMDB_KEY = '016c19fa578a651dfbd937a4a5fc8323';
        const PLEX_TOKEN = '5msRNVbv92Z_oVfyBcrv';
        
        // These are the internal logic links for your buttons
        const PLEX_URL = 'http://plex.tarankurtz.com:32400/web'; 
        const HFS_URL = 'https://transfer.tarankurtz.com:8443'; 
        
        const ADMIN_PASS = 'Potatoes2!'; 
    </script>

    <h1 class="text-4xl font-light tracking-widest mb-10 text-center uppercase">Taran Kurtz</h1>

    <div class="w-full max-w-xl mb-12">
        <form action="https://google.com/search" method="get" class="relative text-center">
            <input type="text" name="q" placeholder="Search Google or AI..." 
                class="w-full bg-zinc-900 border border-zinc-800 rounded-full py-4 px-6 text-lg focus:outline-none focus:border-blue-500 transition-all text-center">
        </form>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 w-full max-w-4xl mb-12">
        <a href="javascript:void(0)" onclick="window.location.href=HFS_URL" class="group bg-zinc-900 border border-zinc-800 p-6 rounded-2xl text-center hover:border-blue-500 transition-all">
            <div class="text-3xl mb-2">📂</div>
            <div class="text-sm font-medium group-hover:text-blue-400">Files</div>
        </a>

        <a href="javascript:void(0)" onclick="window.open(PLEX_URL, '_blank')" class="group bg-zinc-900 border border-zinc-800 p-6 rounded-2xl text-center hover:border-orange-500 transition-all">
            <div class="text-3xl mb-2">🎬</div>
            <div class="text-sm font-medium group-hover:text-orange-400">Plex</div>
        </a>

        <button onclick="toggleModal('requestModal')" class="group bg-zinc-900 border border-zinc-800 p-6 rounded-2xl text-center hover:border-emerald-500 transition-all">
            <div class="text-3xl mb-2">📥</div>
            <div class="text-sm font-medium group-hover:text-emerald-400">Request</div>
        </button>

        <button onclick="toggleModal('listModal')" class="group bg-zinc-900 border border-zinc-800 p-6 rounded-2xl text-center hover:border-yellow-500 transition-all">
            <div class="text-3xl mb-2">📋</div>
            <div class="text-sm font-medium group-hover:text-yellow-400">View List</div>
        </button>
    </div>

    <div id="requestModal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden items-center justify-center z-50 p-4">
        <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl relative">
            <button onclick="closeRequestModal()" class="absolute top-4 right-4 text-zinc-500 hover:text-white">✕</button>
            <h2 id="modalTitle" class="text-xl font-semibold mb-6 text-center text-emerald-400">Request Media</h2>
            
            <div id="searchContainer">
                <input type="text" id="movieSearch" placeholder="Search Movie/TV Title..." autocomplete="off"
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-xl py-3 px-4 focus:outline-none focus:border-emerald-500 text-white">
                <div id="results" class="mt-2 bg-zinc-800 border border-zinc-700 rounded-xl overflow-hidden hidden max-h-64 overflow-y-auto"></div>
            </div>

            <div id="drillDownContainer" class="hidden space-y-4 text-center">
                <div id="drillDownResults" class="bg-zinc-800 border border-zinc-700 rounded-xl overflow-hidden max-h-64 overflow-y-auto"></div>
                <div class="flex gap-2">
                    <button id="backToSeasonBtn" onclick="backToSeasons()" class="hidden flex-1 py-2 text-xs text-blue-400 hover:text-white uppercase tracking-widest border border-blue-900/50 rounded-lg">← Back</button>
                    <button onclick="resetSearch()" class="flex-1 py-2 text-xs text-zinc-500 hover:text-white uppercase tracking-widest border border-zinc-800 rounded-lg">↩ Restart</button>
                </div>
            </div>

            <div id="statusMsg" class="mt-4 p-3 rounded-xl text-center text-sm hidden"></div>
        </div>
    </div>

    <div id="listModal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden items-center justify-center z-50 p-4">
        <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl relative">
            <button onclick="toggleModal('listModal')" class="absolute top-4 right-4 text-zinc-500 hover:text-white">✕</button>
            <h2 class="text-xl font-semibold mb-6 text-center text-yellow-400">Current Queue</h2>
            <ul id="publicRequestList" class="space-y-3 max-h-96 overflow-y-auto pr-2"></ul>
        </div>
    </div>

    <footer onclick="verifyAdmin()" class="mt-20 text-zinc-700 text-xs tracking-widest uppercase cursor-pointer hover:text-zinc-500 transition-colors">
        Private Server &copy; 2026 | <span id="adminStatus">Admin Dashboard</span>
    </footer>

    <script>
        let adminMode = false;
        let selectedShow = null;

        function verifyAdmin() {
            if (adminMode) { adminMode = false; document.getElementById('adminStatus').innerText = "Admin Dashboard"; renderRequests(); return; }
            const pass = prompt("Enter Admin Code:");
            if (pass === ADMIN_PASS) { adminMode = true; document.getElementById('adminStatus').innerText = "ADMIN MODE: ON"; renderRequests(); }
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.classList.toggle('hidden'); m.classList.toggle('flex');
            if(id === 'listModal') renderRequests();
        }

        function closeRequestModal() { toggleModal('requestModal'); resetSearch(); }

        function resetSearch() {
            document.getElementById('searchContainer').classList.remove('hidden');
            document.getElementById('drillDownContainer').classList.add('hidden');
            document.getElementById('backToSeasonBtn').classList.add('hidden');
            document.getElementById('modalTitle').innerText = "Request Media";
            document.getElementById('movieSearch').value = "";
            document.getElementById('results').innerHTML = "";
            document.getElementById('statusMsg').classList.add('hidden');
        }

        const searchInput = document.getElementById('movieSearch');
        const resultsDiv = document.getElementById('results');

        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value;
            if (query.length < 3) { resultsDiv.classList.add('hidden'); return; }
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${query}`);
            const data = await res.json();
            resultsDiv.innerHTML = '';
            resultsDiv.classList.remove('hidden');
            data.results.slice(0, 5).forEach(item => {
                const title = item.title || item.name;
                const year = (item.release_date || item.first_air_date || '').split('-')[0];
                const type = item.media_type;
                if (!title) return;
                const div = document.createElement('div');
                div.className = 'p-3 hover:bg-zinc-700 cursor-pointer border-b border-zinc-700 last:border-0';
                div.innerHTML = `<span class="font-bold text-white">${title}</span> <span class="text-zinc-500 text-xs">(${year}) - ${type === 'tv' ? 'TV' : 'MOVIE'}</span>`;
                div.onclick = () => {
                    if (type === 'tv') startTvDrilldown(item.id, title, year);
                    else runVerification(title, year, "", "MOVIE");
                };
                resultsDiv.appendChild(div);
            });
        });

        async function startTvDrilldown(id, title, year) {
            selectedShow = { id, title, year };
            document.getElementById('searchContainer').classList.add('hidden');
            document.getElementById('drillDownContainer').classList.remove('hidden');
            document.getElementById('modalTitle').innerText = "Select Detail";
            const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${TMDB_KEY}`);
            const data = await res.json();
            const drillDiv = document.getElementById('drillDownResults');
            drillDiv.innerHTML = '';
            const showBtn = document.createElement('div');
            showBtn.className = 'p-4 bg-emerald-600/30 hover:bg-emerald-600 cursor-pointer border-b border-emerald-500/50 text-center font-bold text-white';
            showBtn.innerText = "Request Entire Series";
            showBtn.onclick = () => runVerification(title, year, "", "TV");
            drillDiv.appendChild(showBtn);
            data.seasons.forEach(s => {
                const div = document.createElement('div');
                div.className = 'p-3 hover:bg-zinc-700 cursor-pointer border-b border-zinc-700';
                div.innerHTML = `<span class="font-bold text-white">${s.name}</span> <span class="text-zinc-500 text-xs">(${s.episode_count} Eps)</span>`;
                div.onclick = () => showEpisodeOptions(s.season_number, s.episode_count);
                drillDiv.appendChild(div);
            });
        }

        function showEpisodeOptions(sNum, epCount) {
            document.getElementById('backToSeasonBtn').classList.remove('hidden');
            const drillDiv = document.getElementById('drillDownResults');
            const sPad = sNum.toString().padStart(2, '0');
            drillDiv.innerHTML = `<div class="p-4 bg-blue-900/20 text-blue-400 text-center font-bold border-b border-blue-900/50">Season ${sNum}</div>`;
            const fullS = document.createElement('div');
            fullS.className = 'p-3 hover:bg-blue-600 cursor-pointer border-b border-zinc-700 text-center font-bold';
            fullS.innerText = "Request Entire Season";
            fullS.onclick = () => runVerification(selectedShow.title, selectedShow.year, `[S${sPad}]`, "TV");
            drillDiv.appendChild(fullS);
            for(let i=1; i<=epCount; i++) {
                const epPad = i.toString().padStart(2, '0');
                const div = document.createElement('div');
                div.className = 'p-2 hover:bg-zinc-700 cursor-pointer border-b border-zinc-700 text-sm pl-6 text-zinc-300';
                div.innerText = `Episode ${i} - [S${sPad}E${epPad}]`;
                div.onclick = () => runVerification(selectedShow.title, selectedShow.year, `[S${sPad}E${epPad}]`, "TV");
                drillDiv.appendChild(div);
            }
        }

        function backToSeasons() { if(selectedShow) startTvDrilldown(selectedShow.id, selectedShow.title, selectedShow.year); }

        async function runVerification(title, year, tag = "", mediaType = "MOVIE") {
            const fullTitle = `${title} (${year}) ${tag} - ${mediaType}`.replace(/\s+/g, ' ').trim();
            const statusMsg = document.getElementById('statusMsg');
            statusMsg.className = "mt-4 p-3 rounded-xl text-center text-sm";
            statusMsg.innerText = "Checking Library...";
            statusMsg.classList.remove('hidden');
            const existingRequests = JSON.parse(localStorage.getItem('mediaRequests') || '[]');
            if (existingRequests.some(r => r.title.toLowerCase() === fullTitle.toLowerCase())) {
                statusMsg.innerHTML = `⚠️ Already on the list!`;
                statusMsg.classList.add('bg-yellow-900/20', 'text-yellow-400');
                return;
            }
            try {
                const plexRes = await fetch(`http://plex.tarankurtz.com:32400/search?query=${encodeURIComponent(title)}&X-Plex-Token=${PLEX_TOKEN}`);
                const text = await plexRes.text();
                if (text.includes(title) && tag === "") {
                    statusMsg.innerHTML = `✅ Already on Plex!`;
                    statusMsg.classList.add('bg-blue-900/20', 'text-blue-400');
                } else {
                    addRequest(fullTitle);
                    statusMsg.innerHTML = `🚀 Added to Queue.`;
                    statusMsg.classList.add('bg-emerald-900/20', 'text-emerald-400');
                    setTimeout(() => closeRequestModal(), 1500);
                }
            } catch (err) {
                addRequest(fullTitle);
                statusMsg.innerHTML = "Added (Check offline)";
                setTimeout(() => closeRequestModal(), 1500);
            }
        }

        function addRequest(fullTitle) {
            let requests = JSON.parse(localStorage.getItem('mediaRequests') || '[]');
            requests.push({ title: fullTitle, id: Date.now() });
            localStorage.setItem('mediaRequests', JSON.stringify(requests));
        }

        function renderRequests() {
            const list = document.getElementById('publicRequestList');
            const requests = JSON.parse(localStorage.getItem('mediaRequests') || '[]');
            if (!list) return;
            list.innerHTML = requests.length === 0 ? `<li class="text-zinc-600 italic text-center">No current requests.</li>` : 
                requests.map(req => `<li class="flex justify-between items-center bg-zinc-800/50 p-4 rounded-2xl border border-zinc-800">
                    <div class="font-medium text-sm text-zinc-200">${req.title}</div>
                    ${adminMode ? `<button onclick="removeReq(${req.id})" class="text-xs text-red-400 bg-red-900/20 px-3 py-1 rounded-lg ml-2 shrink-0">Delete</button>` : `<span class="text-[10px] text-zinc-600 uppercase tracking-widest shrink-0 ml-2">Pending</span>`}
                </li>`).join('');
        }

        function removeReq(id) {
            let requests = JSON.parse(localStorage.getItem('mediaRequests') || '[]');
            localStorage.setItem('mediaRequests', JSON.stringify(requests.filter(r => r.id !== id)));
            renderRequests();
        }
    </script>
</body>
</html>
