<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taran's Portal</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <h1 class="text-4xl font-light tracking-widest mb-10">TARAN KURTZ</h1>

    <!-- Search Bar -->
    <div class="w-full max-w-xl mb-12">
        <form action="https://google.com" method="get" class="relative">
            <input type="text" name="q" placeholder="Search Google or AI..." 
                class="w-full bg-zinc-900 border border-zinc-800 rounded-full py-4 px-6 text-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-center">
        </form>
    </div>

    <!-- Quick Links Grid -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-3xl mb-12">
        <a href="http://tarankurtz.com" class="group bg-zinc-900 border border-zinc-800 p-6 rounded-2xl text-center hover:border-blue-500 transition-all">
            <div class="text-3xl mb-2">📂</div>
            <div class="text-sm font-medium group-hover:text-blue-400">Files</div>
        </a>
        <a href="http://tarankurtz.com" class="group bg-zinc-900 border border-zinc-800 p-6 rounded-2xl text-center hover:border-blue-500 transition-all">
            <div class="text-3xl mb-2">🎬</div>
            <div class="text-sm font-medium group-hover:text-blue-400">Overseerr</div>
        </a>
        <a href="https://plex.tv" target="_blank" class="group bg-zinc-900 border border-zinc-800 p-6 rounded-2xl text-center hover:border-blue-500 transition-all">
            <div class="text-3xl mb-2">🍿</div>
            <div class="text-sm font-medium group-hover:text-blue-400">Plex</div>
        </a>
        <a href="https://openai.com" target="_blank" class="group bg-zinc-900 border border-zinc-800 p-6 rounded-2xl text-center hover:border-blue-500 transition-all">
            <div class="text-3xl mb-2">🤖</div>
            <div class="text-sm font-medium group-hover:text-blue-400">AI Chat</div>
        </a>
    </div>

    <!-- Simple Request Form -->
    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 p-8 rounded-3xl shadow-2xl">
        <h2 class="text-xl font-semibold mb-6 text-center text-blue-400">🎬 Media Request</h2>
        
        <!-- Change the action URL to your Google Form or HFS upload link if needed -->
        <form action="#" method="POST" class="space-y-4">
            <div>
                <input type="text" placeholder="Your Name" required
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-3 px-4 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <input type="text" placeholder="Movie or TV Show Name" required
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-3 px-4 focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-colors shadow-lg shadow-blue-900/20">
                Submit Request
            </button>
        </form>
    </div>

    <footer class="mt-20 text-zinc-600 text-xs tracking-widest uppercase">
        Private Server &copy; 2026
    </footer>

</body>
</html>
